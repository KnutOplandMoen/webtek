<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../favicon.png" type="image/png">
<title>Lekeplass — HTML / CSS / JS</title>
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
<style>
  /* Lekeplassen fyller hele skjermen under nav-baren */
  html, body { height: 100%; overflow: hidden; }
  body { display: flex; flex-direction: column; margin: 0; }
  main { flex: 1; min-height: 0; padding: 0; display: flex; }
  .pg-section {
    flex: 1;
    padding: 0;
    margin: 0;
    border: none;
    display: flex;
    min-height: 0;
    min-width: 0;
  }
  /* Overstyrer .container som ellers begrenser bredden */
  .pg-section > .container {
    flex: 1;
    max-width: none;
    width: 100%;
    padding: 0;
    margin: 0;
    display: flex;
    min-height: 0;
    min-width: 0;
  }

  .pg-shell {
    flex: 1;
    display: grid;
    grid-template-columns: 220px 1fr 1fr;
    min-height: 0;
    min-width: 0;
    border: none;
    border-top: 1px solid var(--line-soft);
    border-radius: 0;
    overflow: hidden;
    background: var(--paper);
  }

  /* ---------- File list (sidebar) ---------- */
  .pg-files {
    display: flex;
    flex-direction: column;
    background: var(--paper-darker);
    border-right: 1px solid var(--line-soft);
  }
  .pg-files header {
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-faded);
    border-bottom: 1px solid var(--line-soft);
  }
  .pg-file {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 0.84rem;
    color: var(--ink-soft);
    background: transparent;
    border: none;
    border-left: 3px solid transparent;
    text-align: left;
    cursor: pointer;
  }
  .pg-file:hover { background: var(--paper-dark); }
  .pg-file.is-active {
    background: var(--paper);
    border-left-color: var(--rust);
    color: var(--ink);
    font-weight: 500;
  }
  .pg-file .pg-file-ico {
    display: inline-block;
    width: 18px;
    text-align: center;
    font-weight: 700;
    font-size: 0.7rem;
    padding: 1px 0;
    border-radius: 2px;
    color: white;
  }
  .pg-file[data-file="html"] .pg-file-ico { background: #d35400; }
  .pg-file[data-file="css"]  .pg-file-ico { background: #1f4e79; }
  .pg-file[data-file="js"]   .pg-file-ico { background: #b8881a; }

  .pg-files .pg-tools {
    margin-top: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-top: 1px solid var(--line-soft);
  }
  .pg-tools button {
    font-family: var(--mono);
    font-size: 0.74rem;
    letter-spacing: 0.04em;
    padding: 6px 10px;
    border-radius: 3px;
    cursor: pointer;
    text-align: center;
  }
  .pg-tools .pg-btn-run {
    background: var(--rust);
    color: var(--paper);
    border: none;
    text-transform: uppercase;
  }
  .pg-tools .pg-btn-run:hover { background: var(--rust-dark); }
  .pg-tools .pg-btn-ghost {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--line-soft);
  }
  .pg-tools .pg-btn-ghost:hover { border-color: var(--rust); color: var(--rust); }
  .pg-tools label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 0.74rem;
    color: var(--ink-soft);
    cursor: pointer;
    padding: 2px 0;
  }

  /* ---------- Editor pane ---------- */
  .pg-editor {
    display: flex;
    flex-direction: column;
    background: var(--paper);
    border-right: 1px solid var(--line-soft);
    min-width: 0;
  }
  .pg-tab-bar {
    display: flex;
    background: var(--paper-darker);
    border-bottom: 1px solid var(--line-soft);
    padding: 0 8px;
    height: 34px;
    align-items: stretch;
  }
  .pg-tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 14px;
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--ink-faded);
    border-right: 1px solid var(--line-soft);
    background: transparent;
    border-top: 2px solid transparent;
    border-bottom: none;
    cursor: pointer;
  }
  .pg-tab.is-active {
    background: var(--paper);
    color: var(--ink);
    border-top-color: var(--rust);
  }
  .pg-tab .pg-tab-ico {
    display: inline-block;
    width: 16px;
    text-align: center;
    font-weight: 700;
    font-size: 0.65rem;
    padding: 1px 0;
    border-radius: 2px;
    color: white;
  }
  .pg-tab[data-file="html"] .pg-tab-ico { background: #d35400; }
  .pg-tab[data-file="css"]  .pg-tab-ico { background: #1f4e79; }
  .pg-tab[data-file="js"]   .pg-tab-ico { background: #b8881a; }

  .pg-editor-stage {
    flex: 1;
    position: relative;
    min-height: 0;
  }
  .pg-editor-stage .CodeMirror {
    position: absolute;
    inset: 0;
    height: 100%;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.55;
    background: var(--paper);
    color: var(--ink);
    display: none;
  }
  .pg-editor-stage .CodeMirror.is-active { display: block; }
  .pg-editor-stage .CodeMirror-gutters {
    background: var(--paper-dark);
    border-right: 1px solid var(--line-soft);
  }
  .pg-editor-stage .CodeMirror-linenumber { color: var(--ink-ghost); }
  .pg-editor-stage .CodeMirror-cursor { border-left-color: var(--rust); }
  .pg-editor-stage .CodeMirror-selected { background: rgba(31, 78, 121, 0.18) !important; }

  /* ---------- Preview pane ---------- */
  .pg-preview {
    display: flex;
    flex-direction: column;
    background: white;
    min-width: 0;
  }
  .pg-preview header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 12px;
    height: 34px;
    background: var(--paper-darker);
    border-bottom: 1px solid var(--line-soft);
    font-family: var(--mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-faded);
  }
  .pg-preview header .pg-status {
    color: var(--ink-ghost);
    text-transform: none;
    letter-spacing: 0;
  }
  .pg-preview iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: white;
  }

  /* ---------- Loading state ---------- */
  .pg-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--ink-faded);
    background: var(--paper);
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 900px) {
    .pg-shell {
      grid-template-columns: 1fr;
      grid-template-rows: auto 360px 360px;
      height: auto;
    }
    .pg-files {
      flex-direction: row;
      flex-wrap: wrap;
      border-right: none;
      border-bottom: 1px solid var(--line-soft);
    }
    .pg-files header { width: 100%; }
    .pg-file { flex: 1; border-left: none; border-bottom: 3px solid transparent; }
    .pg-file.is-active { border-left: none; border-bottom-color: var(--rust); }
    .pg-files .pg-tools {
      flex-direction: row;
      flex-wrap: wrap;
      width: 100%;
      border-top: 1px solid var(--line-soft);
    }
    .pg-tools button { flex: 1; }
    .pg-editor { border-right: none; border-bottom: 1px solid var(--line-soft); }
  }
</style>
</head>
<body>

<nav class="site-nav">
  <div class="container">
    <a href="../" class="brand">IT2805</a>
    <a href="../" class="nav-back">&larr; Forside</a>
    <div class="nav-search-wrapper">
      <svg class="nav-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="nav-search" placeholder="Laster…" autocomplete="off" disabled>
      <div id="nav-search-results"></div>
    </div>
  </div>
</nav>

<main data-chapter="Lekeplass — HTML/CSS/JS">
  <section class="pg-section">
    <div class="container">
      <div class="pg-shell">
        <!-- File list -->
        <aside class="pg-files">
          <header>Filer</header>
          <button type="button" class="pg-file is-active" data-file="html">
            <span class="pg-file-ico">H</span> index.html
          </button>
          <button type="button" class="pg-file" data-file="css">
            <span class="pg-file-ico">C</span> style.css
          </button>
          <button type="button" class="pg-file" data-file="js">
            <span class="pg-file-ico">J</span> script.js
          </button>

          <div class="pg-tools">
            <button type="button" class="pg-btn-run" id="pg-run">Kjør &#9654;</button>
            <label><input type="checkbox" id="pg-auto" checked> Auto-kjør</label>
            <button type="button" class="pg-btn-ghost" id="pg-reset">Tilbakestill</button>
            <button type="button" class="pg-btn-ghost" id="pg-clear">Tøm alt</button>
          </div>
        </aside>

        <!-- Editor -->
        <div class="pg-editor">
          <div class="pg-tab-bar">
            <button type="button" class="pg-tab is-active" data-file="html">
              <span class="pg-tab-ico">H</span> index.html
            </button>
            <button type="button" class="pg-tab" data-file="css">
              <span class="pg-tab-ico">C</span> style.css
            </button>
            <button type="button" class="pg-tab" data-file="js">
              <span class="pg-tab-ico">J</span> script.js
            </button>
          </div>
          <div class="pg-editor-stage" id="pg-stage">
            <textarea id="pg-ta-html" spellcheck="false"></textarea>
            <textarea id="pg-ta-css" spellcheck="false"></textarea>
            <textarea id="pg-ta-js" spellcheck="false"></textarea>
            <div class="pg-loading" id="pg-loading">Laster editor…</div>
          </div>
        </div>

        <!-- Preview -->
        <div class="pg-preview">
          <header>
            <span>Preview &mdash; sandbox</span>
            <span class="pg-status" id="pg-status">&nbsp;</span>
          </header>
          <iframe id="pg-preview" sandbox="allow-scripts" title="Sandbox-preview"></iframe>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/css/css.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script>
(function () {
  'use strict';

  const STARTER = {
    html:
      '<h1>Hei, verden!</h1>\n' +
      '<p>Endre koden &mdash; preview oppdaterer seg automatisk.</p>\n' +
      '<button id="knapp">Klikk meg</button>\n' +
      '<p id="utdata"></p>\n',
    css:
      'body {\n' +
      '  font-family: Georgia, serif;\n' +
      '  padding: 1.5em;\n' +
      '  color: #1a1612;\n' +
      '  background: #f4f1ea;\n' +
      '}\n' +
      'h1 { color: #1f4e79; }\n' +
      'button {\n' +
      '  padding: 8px 16px;\n' +
      '  background: #1f4e79;\n' +
      '  color: white;\n' +
      '  border: none;\n' +
      '  border-radius: 4px;\n' +
      '  cursor: pointer;\n' +
      '}\n' +
      'button:hover { background: #163758; }\n',
    js:
      'const knapp = document.getElementById("knapp");\n' +
      'const utdata = document.getElementById("utdata");\n' +
      'let antall = 0;\n' +
      'knapp.addEventListener("click", () => {\n' +
      '  antall++;\n' +
      '  utdata.textContent = "Klikket " + antall + " ganger";\n' +
      '});\n'
  };

  const STORAGE_KEY = 'lekeplass.v2';
  const ACTIVE_KEY = 'lekeplass.v2.active';

  const FILES = ['html', 'css', 'js'];
  const MODES = {
    html: 'htmlmixed',
    css:  'css',
    js:   'javascript'
  };

  const stage = document.getElementById('pg-stage');
  const loading = document.getElementById('pg-loading');
  const preview = document.getElementById('pg-preview');
  const runBtn = document.getElementById('pg-run');
  const autoBox = document.getElementById('pg-auto');
  const resetBtn = document.getElementById('pg-reset');
  const clearBtn = document.getElementById('pg-clear');
  const status = document.getElementById('pg-status');

  const editors = {};
  let activeFile = 'html';

  function loadSaved() {
    let saved = null;
    try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); }
    catch (e) { saved = null; }
    const out = {};
    FILES.forEach((f) => {
      out[f] = (saved && saved[f] != null) ? saved[f] : STARTER[f];
    });
    try { activeFile = localStorage.getItem(ACTIVE_KEY) || 'html'; } catch (e) {}
    if (!FILES.includes(activeFile)) activeFile = 'html';
    return out;
  }

  function save() {
    const data = {};
    FILES.forEach((f) => { data[f] = editors[f].getValue(); });
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
    try { localStorage.setItem(ACTIVE_KEY, activeFile); } catch (e) {}
  }

  function buildSrcdoc(h, c, j) {
    const errStyle =
      'color:#a23b2a;font:13px monospace;background:#f0d9d3;' +
      'padding:8px;border-radius:4px;margin-top:8px;white-space:pre-wrap;';
    return (
      '<!doctype html>\n' +
      '<html><head><meta charset="utf-8"><style>\n' +
      c + '\n' +
      '</style></head><body>\n' +
      h + '\n' +
      '<script>\n' +
      'window.addEventListener("error", function (e) {\n' +
      '  var p = document.createElement("pre");\n' +
      '  p.style.cssText = ' + JSON.stringify(errStyle) + ';\n' +
      '  p.textContent = (e.message || e.error || "Error");\n' +
      '  document.body.appendChild(p);\n' +
      '});\n' +
      'try {\n' +
      j + '\n' +
      '} catch (e) {\n' +
      '  var p = document.createElement("pre");\n' +
      '  p.style.cssText = ' + JSON.stringify(errStyle) + ';\n' +
      '  p.textContent = (e && e.message) ? e.message : String(e);\n' +
      '  document.body.appendChild(p);\n' +
      '}\n' +
      '<\/script>\n' +
      '</body></html>'
    );
  }

  function run() {
    const h = editors.html.getValue();
    const c = editors.css.getValue();
    const j = editors.js.getValue();
    preview.srcdoc = buildSrcdoc(h, c, j);
    const t = new Date();
    const pad = (n) => String(n).padStart(2, '0');
    status.textContent = 'Kjørt ' + pad(t.getHours()) + ':' + pad(t.getMinutes()) + ':' + pad(t.getSeconds());
  }

  let debounce = null;
  function scheduleAuto() {
    if (!autoBox.checked) return;
    if (debounce) clearTimeout(debounce);
    debounce = setTimeout(run, 400);
  }

  function setActive(file) {
    if (!FILES.includes(file)) return;
    activeFile = file;
    FILES.forEach((f) => {
      editors[f].getWrapperElement().classList.toggle('is-active', f === file);
    });
    document.querySelectorAll('.pg-file').forEach((b) => {
      b.classList.toggle('is-active', b.getAttribute('data-file') === file);
    });
    document.querySelectorAll('.pg-tab').forEach((b) => {
      b.classList.toggle('is-active', b.getAttribute('data-file') === file);
    });
    editors[file].refresh();
    editors[file].focus();
    save();
  }

  function init() {
    if (typeof CodeMirror === 'undefined') {
      loading.textContent = 'Kunne ikke laste editor (CodeMirror). Sjekk nett.';
      return;
    }

    const initial = loadSaved();

    FILES.forEach((f) => {
      const ta = document.getElementById('pg-ta-' + f);
      ta.value = initial[f];
      const cm = CodeMirror.fromTextArea(ta, {
        mode: MODES[f],
        lineNumbers: true,
        lineWrapping: false,
        indentUnit: 2,
        tabSize: 2,
        indentWithTabs: false,
        autoCloseBrackets: false,
        viewportMargin: Infinity,
        extraKeys: {
          'Tab': (cm) => cm.replaceSelection('  '),
          'Ctrl-Enter': run,
          'Cmd-Enter': run,
          'Ctrl-S': (cm) => { save(); run(); },
          'Cmd-S': (cm) => { save(); run(); }
        }
      });
      cm.on('change', () => { save(); scheduleAuto(); });
      editors[f] = cm;
    });

    loading.remove();

    document.querySelectorAll('.pg-file, .pg-tab').forEach((btn) => {
      btn.addEventListener('click', () => setActive(btn.getAttribute('data-file')));
    });

    runBtn.addEventListener('click', run);

    resetBtn.addEventListener('click', () => {
      if (!confirm('Tilbakestille til eksempel-koden? Det du har skrevet forsvinner.')) return;
      FILES.forEach((f) => editors[f].setValue(STARTER[f]));
      save();
      run();
    });

    clearBtn.addEventListener('click', () => {
      if (!confirm('Tømme alle tre filer?')) return;
      FILES.forEach((f) => editors[f].setValue(''));
      save();
      run();
    });

    setActive(activeFile);
    run();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

<script src="../nav-search.js"></script>
<script src="../chat-widget.js"></script>
