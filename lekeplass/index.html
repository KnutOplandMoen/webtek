<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../favicon.png" type="image/png">
<title>Lekeplass — HTML / CSS / JS</title>
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
<style>
  /* Lekeplassen fyller hele skjermen under nav-baren */
  html, body { height: 100%; overflow: hidden; }
  body { display: flex; flex-direction: column; margin: 0; }
  main { flex: 1; min-height: 0; padding: 0; display: flex; }
  .pg-section {
    flex: 1;
    padding: 0;
    margin: 0;
    border: none;
    display: flex;
    min-height: 0;
    min-width: 0;
  }
  /* Overstyrer .container som ellers begrenser bredden */
  .pg-section > .container {
    flex: 1;
    max-width: none;
    width: 100%;
    padding: 0;
    margin: 0;
    display: flex;
    min-height: 0;
    min-width: 0;
  }

  .pg-shell {
    flex: 1;
    display: grid;
    grid-template-columns: 220px 1fr 1fr;
    min-height: 0;
    min-width: 0;
    border: none;
    border-top: 1px solid var(--line-soft);
    border-radius: 0;
    overflow: hidden;
    background: var(--paper);
  }

  /* ---------- File list (sidebar) ---------- */
  .pg-files {
    display: flex;
    flex-direction: column;
    background: var(--paper-darker);
    border-right: 1px solid var(--line-soft);
  }
  .pg-files header {
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-faded);
    border-bottom: 1px solid var(--line-soft);
  }
  .pg-file {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 0.84rem;
    color: var(--ink-soft);
    background: transparent;
    border: none;
    border-left: 3px solid transparent;
    text-align: left;
    cursor: pointer;
  }
  .pg-file:hover { background: var(--paper-dark); }
  .pg-file.is-active {
    background: var(--paper);
    border-left-color: var(--rust);
    color: var(--ink);
    font-weight: 500;
  }
  .pg-file .pg-file-ico {
    display: inline-block;
    width: 18px;
    text-align: center;
    font-weight: 700;
    font-size: 0.7rem;
    padding: 1px 0;
    border-radius: 2px;
    color: white;
  }
  .pg-file[data-file="html"] .pg-file-ico { background: #d35400; }
  .pg-file[data-file="css"]  .pg-file-ico { background: #1f4e79; }
  .pg-file[data-file="js"]   .pg-file-ico { background: #b8881a; }

  .pg-files .pg-tools {
    margin-top: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-top: 1px solid var(--line-soft);
  }
  .pg-tools button {
    font-family: var(--mono);
    font-size: 0.74rem;
    letter-spacing: 0.04em;
    padding: 6px 10px;
    border-radius: 3px;
    cursor: pointer;
    text-align: center;
  }
  .pg-tools .pg-btn-run {
    background: var(--rust);
    color: var(--paper);
    border: none;
    text-transform: uppercase;
  }
  .pg-tools .pg-btn-run:hover { background: var(--rust-dark); }
  .pg-tools .pg-btn-ghost {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--line-soft);
  }
  .pg-tools .pg-btn-ghost:hover { border-color: var(--rust); color: var(--rust); }
  .pg-tools label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 0.74rem;
    color: var(--ink-soft);
    cursor: pointer;
    padding: 2px 0;
  }

  /* ---------- Editor pane ---------- */
  .pg-editor {
    display: flex;
    flex-direction: column;
    background: var(--paper);
    border-right: 1px solid var(--line-soft);
    min-width: 0;
  }
  .pg-tab-bar {
    display: flex;
    background: var(--paper-darker);
    border-bottom: 1px solid var(--line-soft);
    padding: 0 8px;
    height: 34px;
    align-items: stretch;
  }
  .pg-tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 14px;
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--ink-faded);
    border-right: 1px solid var(--line-soft);
    background: transparent;
    border-top: 2px solid transparent;
    border-bottom: none;
    cursor: pointer;
  }
  .pg-tab.is-active {
    background: var(--paper);
    color: var(--ink);
    border-top-color: var(--rust);
  }
  .pg-tab .pg-tab-ico {
    display: inline-block;
    width: 16px;
    text-align: center;
    font-weight: 700;
    font-size: 0.65rem;
    padding: 1px 0;
    border-radius: 2px;
    color: white;
  }
  .pg-tab[data-file="html"] .pg-tab-ico { background: #d35400; }
  .pg-tab[data-file="css"]  .pg-tab-ico { background: #1f4e79; }
  .pg-tab[data-file="js"]   .pg-tab-ico { background: #b8881a; }

  .pg-editor-stage {
    flex: 1;
    position: relative;
    min-height: 0;
  }
  .pg-editor-stage .CodeMirror {
    position: absolute;
    inset: 0;
    height: 100%;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.55;
    background: var(--paper);
    color: var(--ink);
    display: none;
  }
  .pg-editor-stage .CodeMirror.is-active { display: block; }
  .pg-editor-stage .CodeMirror-gutters {
    background: var(--paper-dark);
    border-right: 1px solid var(--line-soft);
  }
  .pg-editor-stage .CodeMirror-linenumber { color: var(--ink-ghost); }
  .pg-editor-stage .CodeMirror-cursor { border-left-color: var(--rust); }
  .pg-editor-stage .CodeMirror-selected { background: rgba(31, 78, 121, 0.18) !important; }

  /* ---------- Preview pane ---------- */
  .pg-preview {
    display: flex;
    flex-direction: column;
    background: white;
    min-width: 0;
  }
  .pg-preview > header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 12px;
    height: 34px;
    background: var(--paper-darker);
    border-bottom: 1px solid var(--line-soft);
    font-family: var(--mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-faded);
  }
  .pg-preview > header .pg-status {
    color: var(--ink-ghost);
    text-transform: none;
    letter-spacing: 0;
  }
  .pg-preview iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: white;
  }

  /* ---------- Console ---------- */
  .pg-console {
    display: none;
    flex-direction: column;
    height: 200px;
    background: #1e1b18;
    color: #e8e3d6;
    border-top: 1px solid #000;
    min-height: 0;
  }
  .pg-console.is-open { display: flex; }
  .pg-console header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    background: #2a2622;
    border-bottom: 1px solid #000;
    font-family: var(--mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #a39886;
  }
  .pg-console header .spacer { flex: 1; }
  .pg-console header button {
    font-family: var(--mono);
    font-size: 0.7rem;
    background: transparent;
    color: #a39886;
    border: 1px solid #444;
    border-radius: 3px;
    padding: 2px 8px;
    cursor: pointer;
  }
  .pg-console header button:hover { color: #fff; border-color: #777; }
  .pg-console-body {
    flex: 1;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.45;
    padding: 4px 0;
  }
  .pg-console-line {
    padding: 3px 12px;
    border-bottom: 1px solid #2a2622;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .pg-console-line.level-log   { color: #e8e3d6; }
  .pg-console-line.level-info  { color: #8fc1e8; }
  .pg-console-line.level-warn  { color: #e8c987; background: #38301a; }
  .pg-console-line.level-error { color: #ff9a8a; background: #3a201c; }
  .pg-console-line.level-debug { color: #888; }
  .pg-console-line .lvl {
    display: inline-block;
    width: 42px;
    color: #6b6257;
    text-transform: uppercase;
    font-size: 0.68rem;
  }
  .pg-console-empty {
    padding: 14px;
    color: #6b6257;
    font-style: italic;
  }
  /* Liten badge på toggle-knappen når det er nye logger */
  #pg-console-toggle.has-new {
    border-color: var(--rust);
    color: var(--rust);
  }
  #pg-console-toggle .pg-badge {
    display: none;
    margin-left: 6px;
    background: var(--rust);
    color: var(--paper);
    border-radius: 8px;
    padding: 0 6px;
    font-size: 0.65rem;
  }
  #pg-console-toggle.has-new .pg-badge { display: inline-block; }

  /* ---------- Loading state ---------- */
  .pg-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--ink-faded);
    background: var(--paper);
  }

  /* ---------- Jukseark-panel ---------- */
  .pg-cheat-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(26, 22, 18, 0.35);
    z-index: 9000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  .pg-cheat-backdrop.is-open { opacity: 1; pointer-events: auto; }
  .pg-cheat-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(900px, 80vw);
    background: var(--paper);
    border-left: 1px solid var(--line-soft);
    box-shadow: -8px 0 24px rgba(0,0,0,0.12);
    z-index: 9001;
    transform: translateX(100%);
    transition: transform 0.2s ease;
    display: flex;
    flex-direction: column;
  }
  .pg-cheat-panel.is-open { transform: translateX(0); }
  .pg-cheat-panel header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--paper-darker);
    border-bottom: 1px solid var(--line-soft);
  }
  .pg-cheat-panel header h2 {
    margin: 0;
    flex: 1;
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.1rem;
    color: var(--ink);
  }
  .pg-cheat-panel header h2 em { color: var(--rust); font-style: normal; }
  .pg-cheat-panel header button {
    font-family: var(--mono);
    font-size: 0.74rem;
    letter-spacing: 0.04em;
    padding: 6px 12px;
    border: 1px solid var(--line-soft);
    background: transparent;
    color: var(--ink-soft);
    border-radius: 3px;
    cursor: pointer;
  }
  .pg-cheat-panel header button:hover { border-color: var(--rust); color: var(--rust); }
  .pg-cheat-panel header .pg-cheat-close {
    font-size: 1rem;
    padding: 4px 10px;
  }
  .pg-cheat-panel iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: var(--paper);
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 900px) {
    .pg-shell {
      grid-template-columns: 1fr;
      grid-template-rows: auto 360px 360px;
      height: auto;
    }
    .pg-files {
      flex-direction: row;
      flex-wrap: wrap;
      border-right: none;
      border-bottom: 1px solid var(--line-soft);
    }
    .pg-files header { width: 100%; }
    .pg-file { flex: 1; border-left: none; border-bottom: 3px solid transparent; }
    .pg-file.is-active { border-left: none; border-bottom-color: var(--rust); }
    .pg-files .pg-tools {
      flex-direction: row;
      flex-wrap: wrap;
      width: 100%;
      border-top: 1px solid var(--line-soft);
    }
    .pg-tools button { flex: 1; }
    .pg-editor { border-right: none; border-bottom: 1px solid var(--line-soft); }
  }
</style>
</head>

<script>
(function () {
  'use strict';

  const STARTER = {
    html:
      '<h1>Hei, verden!</h1>\n' +
      '<p>Endre koden &mdash; preview oppdaterer seg automatisk.</p>\n' +
      '<button id="knapp">Klikk meg</button>\n' +
      '<p id="utdata"></p>\n',
    css:
      'body {\n' +
      '  font-family: Georgia, serif;\n' +
      '  padding: 1.5em;\n' +
      '  color: #1a1612;\n' +
      '  background: #f4f1ea;\n' +
      '}\n' +
      'h1 { color: #1f4e79; }\n' +
      'button {\n' +
      '  padding: 8px 16px;\n' +
      '  background: #1f4e79;\n' +
      '  color: white;\n' +
      '  border: none;\n' +
      '  border-radius: 4px;\n' +
      '  cursor: pointer;\n' +
      '}\n' +
      'button:hover { background: #163758; }\n',
    js:
      'const knapp = document.getElementById("knapp");\n' +
      'const utdata = document.getElementById("utdata");\n' +
      'let antall = 0;\n' +
      'knapp.addEventListener("click", () => {\n' +
      '  antall++;\n' +
      '  utdata.textContent = "Klikket " + antall + " ganger";\n' +
      '});\n'
  };

  const STORAGE_KEY = 'lekeplass.v2';
  const ACTIVE_KEY = 'lekeplass.v2.active';

  const FILES = ['html', 'css', 'js'];
  const MODES = {
    html: 'htmlmixed',
    css:  'css',
    js:   'javascript'
  };

  const stage = document.getElementById('pg-stage');
  const loading = document.getElementById('pg-loading');
  const preview = document.getElementById('pg-preview');
  const runBtn = document.getElementById('pg-run');
  const autoBox = document.getElementById('pg-auto');
  const resetBtn = document.getElementById('pg-reset');
  const clearBtn = document.getElementById('pg-clear');
  const status = document.getElementById('pg-status');

  const editors = {};
  let activeFile = 'html';

  function loadSaved() {
    let saved = null;
    try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); }
    catch (e) { saved = null; }
    const out = {};
    FILES.forEach((f) => {
      out[f] = (saved && saved[f] != null) ? saved[f] : STARTER[f];
    });
    try { activeFile = localStorage.getItem(ACTIVE_KEY) || 'html'; } catch (e) {}
    if (!FILES.includes(activeFile)) activeFile = 'html';
    return out;
  }

  function save() {
    const data = {};
    FILES.forEach((f) => { data[f] = editors[f].getValue(); });
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
    try { localStorage.setItem(ACTIVE_KEY, activeFile); } catch (e) {}
  }

  function buildSrcdoc(h, c, j) {
    const errStyle =
      'color:#a23b2a;font:13px monospace;background:#f0d9d3;' +
      'padding:8px;border-radius:4px;margin-top:8px;white-space:pre-wrap;';
    // Konsoll-hijack: omdiriger console.log/info/warn/error/debug + window.onerror
    // til parent via postMessage, slik at lekeplassens konsoll-panel kan vise dem.
    const consoleHijack =
      '(function(){' +
        'function fmt(a){' +
          'if(a===null)return"null";' +
          'if(a===undefined)return"undefined";' +
          'if(typeof a==="string")return a;' +
          'if(typeof a==="function")return a.toString();' +
          'if(a instanceof Error)return a.stack||a.message||String(a);' +
          'try{var seen=new WeakSet();return JSON.stringify(a,function(k,v){' +
            'if(typeof v==="object"&&v!==null){if(seen.has(v))return"[circular]";seen.add(v);}' +
            'if(typeof v==="function")return"[function]";' +
            'return v;' +
          '},2);}catch(e){return String(a);}' +
        '}' +
        'function send(level,args){try{parent.postMessage({source:"pg-console",level:level,args:args.map(fmt)},"*");}catch(e){}}' +
        '["log","info","warn","error","debug"].forEach(function(lvl){' +
          'var orig=console[lvl]?console[lvl].bind(console):function(){};' +
          'console[lvl]=function(){send(lvl,[].slice.call(arguments));orig.apply(console,arguments);};' +
        '});' +
        'window.addEventListener("error",function(e){' +
          'var msg=e.message||"Error";' +
          'if(e.filename)msg+=" @ "+e.filename+":"+e.lineno;' +
          'send("error",[msg]);' +
        '});' +
        'window.addEventListener("unhandledrejection",function(e){' +
          'send("error",["Unhandled promise rejection: "+(e.reason&&e.reason.message?e.reason.message:String(e.reason))]);' +
        '});' +
      '})();';
    return (
      '<!doctype html>\n' +
      '<html><head><meta charset="utf-8"><style>\n' +
      c + '\n' +
      '</style></head><body>\n' +
      '<script>' + consoleHijack + '<\/script>\n' +
      h + '\n' +
      '<script>\n' +
      'window.addEventListener("error", function (e) {\n' +
      '  var p = document.createElement("pre");\n' +
      '  p.style.cssText = ' + JSON.stringify(errStyle) + ';\n' +
      '  p.textContent = (e.message || e.error || "Error");\n' +
      '  document.body.appendChild(p);\n' +
      '});\n' +
      'try {\n' +
      j + '\n' +
      '} catch (e) {\n' +
      '  var p = document.createElement("pre");\n' +
      '  p.style.cssText = ' + JSON.stringify(errStyle) + ';\n' +
      '  p.textContent = (e && e.message) ? e.message : String(e);\n' +
      '  document.body.appendChild(p);\n' +
      '  console.error(e && e.message ? e.message : String(e));\n' +
      '}\n' +
      '<\/script>\n' +
      '</body></html>'
    );
  }

  function run() {
    const h = editors.html.getValue();
    const c = editors.css.getValue();
    const j = editors.js.getValue();
    if (window.__pgConsole) window.__pgConsole.reset();
    preview.srcdoc = buildSrcdoc(h, c, j);
    const t = new Date();
    const pad = (n) => String(n).padStart(2, '0');
    status.textContent = 'Kjørt ' + pad(t.getHours()) + ':' + pad(t.getMinutes()) + ':' + pad(t.getSeconds());
  }

  let debounce = null;
  function scheduleAuto() {
    if (!autoBox.checked) return;
    if (debounce) clearTimeout(debounce);
    debounce = setTimeout(run, 400);
  }

  function setActive(file) {
    if (!FILES.includes(file)) return;
    activeFile = file;
    FILES.forEach((f) => {
      editors[f].getWrapperElement().classList.toggle('is-active', f === file);
    });
    document.querySelectorAll('.pg-file').forEach((b) => {
      b.classList.toggle('is-active', b.getAttribute('data-file') === file);
    });
    document.querySelectorAll('.pg-tab').forEach((b) => {
      b.classList.toggle('is-active', b.getAttribute('data-file') === file);
    });
    editors[file].refresh();
    editors[file].focus();
    save();
  }

  function init() {
    if (typeof CodeMirror === 'undefined') {
      loading.textContent = 'Kunne ikke laste editor (CodeMirror). Sjekk nett.';
      return;
    }

    const initial = loadSaved();

    FILES.forEach((f) => {
      const ta = document.getElementById('pg-ta-' + f);
      ta.value = initial[f];
      const cm = CodeMirror.fromTextArea(ta, {
        mode: MODES[f],
        lineNumbers: true,
        lineWrapping: false,
        indentUnit: 2,
        tabSize: 2,
        indentWithTabs: false,
        autoCloseBrackets: false,
        viewportMargin: Infinity,
        extraKeys: {
          'Tab': (cm) => cm.replaceSelection('  '),
          'Ctrl-Enter': run,
          'Cmd-Enter': run,
          'Ctrl-S': (cm) => { save(); run(); },
          'Cmd-S': (cm) => { save(); run(); }
        }
      });
      cm.on('change', () => { save(); scheduleAuto(); });
      editors[f] = cm;
    });

    loading.remove();

    document.querySelectorAll('.pg-file, .pg-tab').forEach((btn) => {
      btn.addEventListener('click', () => setActive(btn.getAttribute('data-file')));
    });

    runBtn.addEventListener('click', run);

    resetBtn.addEventListener('click', () => {
      if (!confirm('Tilbakestille til eksempel-koden? Det du har skrevet forsvinner.')) return;
      FILES.forEach((f) => editors[f].setValue(STARTER[f]));
      save();
      run();
    });

    clearBtn.addEventListener('click', () => {
      if (!confirm('Tømme alle tre filer?')) return;
      FILES.forEach((f) => editors[f].setValue(''));
      save();
      run();
    });

    setActive(activeFile);
    run();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

/* ---------- Konsoll-panel ---------- */
(function () {
  'use strict';
  const panel  = document.getElementById('pg-console');
  const body   = document.getElementById('pg-console-body');
  const toggle = document.getElementById('pg-console-toggle');
  const badge  = document.getElementById('pg-console-badge');
  const clear  = document.getElementById('pg-console-clear');
  const close  = document.getElementById('pg-console-close');
  let count = 0;
  let empty = true;

  function isOpen() { return panel.classList.contains('is-open'); }

  function setEmpty() {
    body.innerHTML = '<div class="pg-console-empty">Ingen output ennå. Skriv f.eks. <code>console.log("hei")</code> i JS-fila og kjør.</div>';
    empty = true;
  }

  function append(level, args) {
    if (empty) { body.innerHTML = ''; empty = false; }
    const line = document.createElement('div');
    line.className = 'pg-console-line level-' + level;
    const lvl = document.createElement('span');
    lvl.className = 'lvl';
    lvl.textContent = level;
    line.appendChild(lvl);
    line.appendChild(document.createTextNode(args.join('  ')));
    body.appendChild(line);
    body.scrollTop = body.scrollHeight;
    count += 1;
    if (!isOpen()) {
      toggle.classList.add('has-new');
      badge.textContent = String(count);
    }
  }

  function open() {
    panel.classList.add('is-open');
    toggle.classList.remove('has-new');
    count = 0;
  }
  function shut() { panel.classList.remove('is-open'); }
  function toggleOpen() { isOpen() ? shut() : open(); }

  function reset() {
    setEmpty();
    count = 0;
    toggle.classList.remove('has-new');
    badge.textContent = '0';
  }

  toggle.addEventListener('click', toggleOpen);
  close.addEventListener('click', shut);
  clear.addEventListener('click', reset);

  window.addEventListener('message', (e) => {
    if (!e.data || e.data.source !== 'pg-console') return;
    if (!Array.isArray(e.data.args)) return;
    append(e.data.level || 'log', e.data.args);
  });

  // Eksponer reset for run()
  window.__pgConsole = { reset: reset };
})();

/* ---------- Jukseark-panel ---------- */
(function () {
  'use strict';
  const backdrop = document.getElementById('pg-cheat-backdrop');
  const panel    = document.getElementById('pg-cheat-panel');
  const frame    = document.getElementById('pg-cheat-frame');
  const toggle   = document.getElementById('pg-cheat-toggle');
  const refresh  = document.getElementById('pg-cheat-refresh');
  const close    = document.getElementById('pg-cheat-close');

  const SRC = '../eksamen/a4-jukseark.html';
  let loaded = false;

  function reload() {
    // Cache-buster sikrer at vi alltid får siste versjon, selv om CDN/nettleser
    // har lagret en eldre kopi.
    frame.src = SRC + '?t=' + Date.now();
    loaded = true;
  }

  function open() {
    if (!loaded) reload();
    backdrop.classList.add('is-open');
    panel.classList.add('is-open');
    panel.setAttribute('aria-hidden', 'false');
  }
  function shut() {
    backdrop.classList.remove('is-open');
    panel.classList.remove('is-open');
    panel.setAttribute('aria-hidden', 'true');
  }
  function toggleOpen() {
    if (panel.classList.contains('is-open')) shut(); else open();
  }

  toggle.addEventListener('click', toggleOpen);
  close.addEventListener('click', shut);
  backdrop.addEventListener('click', shut);
  refresh.addEventListener('click', reload);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && panel.classList.contains('is-open')) shut();
    // Ctrl/Cmd + J = toggle jukseark
    if ((e.ctrlKey || e.metaKey) && (e.key === 'j' || e.key === 'J')) {
      e.preventDefault();
      toggleOpen();
    }
  });
})();
